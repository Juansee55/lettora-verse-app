<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lettora</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
        .loading {
            text-align: center;
            color: #fff;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // GitHub Pages SPA routing fix
        // Redirect 404s to the index.html with the path preserved
        (function() {
            const path = window.location.pathname;
            
            // Extract the base path (should be /lettora-verse-app)
            const basePath = '/lettora-verse-app';
            
            // Get the path after the base
            let redirectPath = path;
            if (path.startsWith(basePath)) {
                redirectPath = path.substring(basePath.length);
            }
            
            // Only redirect if it's not the root and not a file
            if (redirectPath && redirectPath !== '/' && !redirectPath.includes('.')) {
                // Store the original path to restore after page load
                sessionStorage.redirect = redirectPath;
                // Redirect to index.html
                window.location.href = basePath + '/';
            }
        })();
    </script>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>Cargando Lettora...</p>
    </div>
</body>
</html>
