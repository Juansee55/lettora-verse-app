name: Android CI

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform and sync Capacitor
        run: |
          npx cap add android || true # Add android if not already added
          npx cap sync android

      - name: Create Keystore file
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/release.keystore

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          ORG_GRADLE_PROJECT_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign and Align APK (Optional, if not handled by Gradle)
        # Gradle usually handles signing and zipalign for assembleRelease
        # This step is a fallback/double-check. Adjust if your Gradle setup is different.
        run: |
          # No need for manual signing if assembleRelease handles it. 
          # If you need to sign manually, uncomment and adjust paths/commands:
          # jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
          #   -keystore android/app/release.keystore \
          #   -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
          #   android/app/build/outputs/apk/release/app-release-unsigned.apk \
          #   ${{ secrets.KEY_ALIAS }}
          # zipalign -v 4 \
          #   android/app/build/outputs/apk/release/app-release-unsigned.apk \
          #   android/app/build/outputs/apk/release/app-release-signed-aligned.apk
          echo "Signing and aligning handled by Gradle assembleRelease. Skipping manual step."

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
