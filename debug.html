<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lettora Debug</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #00ffff;
        }
        .log {
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border-left: 3px solid #00ff00;
        }
        .error {
            border-left-color: #ff0000;
            color: #ff6666;
        }
        .success {
            border-left-color: #00ff00;
            color: #66ff66;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Lettora Debug Console</h1>
        <div id="logs"></div>
    </div>

    <script>
        const logsDiv = document.getElementById('logs');
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(div);
            console.log(message);
        }

        log('🚀 Iniciando diagnóstico de Lettora...', 'info');
        
        // Check environment
        log(`📍 URL actual: ${window.location.href}`, 'info');
        log(`📍 Pathname: ${window.location.pathname}`, 'info');
        log(`📍 Hostname: ${window.location.hostname}`, 'info');
        
        // Check if root element exists
        const rootElement = document.getElementById('root');
        if (rootElement) {
            log('✅ Elemento #root encontrado', 'success');
        } else {
            log('❌ Elemento #root NO encontrado', 'error');
        }
        
        // Check sessionStorage
        if (sessionStorage.redirect) {
            log(`📦 sessionStorage.redirect = ${sessionStorage.redirect}`, 'info');
        } else {
            log('📦 sessionStorage.redirect vacío', 'info');
        }
        
        // Try to load main script
        log('⏳ Intentando cargar script principal...', 'info');
        
        // Simulate script loading
        const scriptPath = '/lettora-verse-app/assets/index-B8lXWwTa.js';
        fetch(scriptPath)
            .then(response => {
                if (response.ok) {
                    log(`✅ Script encontrado: ${scriptPath}`, 'success');
                } else {
                    log(`❌ Script no encontrado (${response.status}): ${scriptPath}`, 'error');
                }
            })
            .catch(error => {
                log(`❌ Error al cargar script: ${error.message}`, 'error');
            });
        
        // Check manifest
        fetch('/lettora-verse-app/manifest.json')
            .then(response => {
                if (response.ok) {
                    log('✅ manifest.json encontrado', 'success');
                } else {
                    log(`❌ manifest.json no encontrado (${response.status})`, 'error');
                }
            })
            .catch(error => {
                log(`❌ Error al cargar manifest: ${error.message}`, 'error');
            });
        
        // Check localStorage
        log(`💾 localStorage.length = ${localStorage.length}`, 'info');
        
        log('✨ Diagnóstico completado', 'success');
    </script>
</body>
</html>
